# ─── Production Profile ─────────────────────────────────────
# Activate with: --spring.profiles.active=prod
# Or set SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lifetracker}
    username: ${DATABASE_USERNAME:lifetracker}
    password: ${DATABASE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: WARN
    com.lifetracker: INFO
    org.springframework.security: WARN

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 86400000
