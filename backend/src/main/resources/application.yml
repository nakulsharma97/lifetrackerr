server:
  port: ${PORT:8080}

spring:
  application:
    name: lifetracker

  # Default profile uses H2 in-memory database
  datasource:
    url: jdbc:h2:mem:lifetracker
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# JWT Configuration
app:
  jwt:
    secret: "${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47}"
    expiration-ms: 86400000  # 24 hours

  # Application URL (used in password reset emails)
  base-url: ${APP_BASE_URL:http://localhost:5173}

  # Mail defaults
  mail:
    from: ${MAIL_FROM:noreply@lifetracker.app}

---
# Production profile — PostgreSQL
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lifetracker}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:lifetracker}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@lifetracker.app}
