server:
  port: 8080

spring:
  application:
    name: lifetracker

  # Default profile uses H2 in-memory database
  datasource:
    url: jdbc:h2:mem:lifetracker
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# JWT Configuration (loaded by all profiles)
app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47"
    expiration-ms: 86400000  # 24 hours

---
# Production profile — PostgreSQL (Render)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lifetracker}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:lifetracker}
    password: ${DB_PASSWORD:lifetracker}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false
